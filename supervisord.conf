[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:postgres-wait]
command=python /app/docker/wait_for_db.py
autostart=true
autorestart=false
startsecs=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api-gateway]
command=bash -c "cd /app/api-gateway/api_gateway && python manage.py migrate --noinput && gunicorn api_gateway.wsgi:application --bind 0.0.0.0:8888 --workers 2"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DATABASE_URL="%(ENV_DATABASE_URL)s"

[program:customer-service]
command=bash -c "cd /app/customer-service/customer_service && python manage.py migrate --noinput && gunicorn customer_service.wsgi:application --bind 0.0.0.0:8881 --workers 1"
autostart=true
