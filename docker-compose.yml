# docker-compose.yml
name: microservice

services:
  # ─────────────────────────────────────────────
  # PostgreSQL – shared instance, 12 databases
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: >
        customer_db,book_db,product_db,cart_db,staff_db,manager_db,
        catalog_db,order_db,ship_db,pay_db,
        comment_rate_db,recommender_db,gateway_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Application services
  # ─────────────────────────────────────────────
  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/customer_db
      CART_SERVICE_URL: http://cart-service:8888
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started

  book-service:
    build:
      context: .
      dockerfile: book-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/book_db
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/product_db
    depends_on:
      postgres:
        condition: service_healthy

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/cart_db
      PRODUCT_SERVICE_URL: http://product-service:8888
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started

  staff-service:
    build:
      context: .
      dockerfile: staff-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/staff_db
    depends_on:
      postgres:
        condition: service_healthy

  manager-service:
    build:
      context: .
      dockerfile: manager-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/manager_db
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/catalog_db
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/order_db
      PAY_SERVICE_URL: http://pay-service:8888
      SHIP_SERVICE_URL: http://ship-service:8888
      PRODUCT_SERVICE_URL: http://product-service:8888
    depends_on:
      postgres:
        condition: service_healthy
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      product-service:
        condition: service_started

  ship-service:
    build:
      context: .
      dockerfile: ship-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ship_db
    depends_on:
      postgres:
        condition: service_healthy

  pay-service:
    build:
      context: .
      dockerfile: pay-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/pay_db
    depends_on:
      postgres:
        condition: service_healthy

  comment-rate-service:
    build:
      context: .
      dockerfile: comment-rate-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/comment_rate_db
    depends_on:
      postgres:
        condition: service_healthy

  recommender-ai-service:
    build:
      context: .
      dockerfile: recommender-ai-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/recommender_db
      PRODUCT_SERVICE_URL: http://product-service:8888
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8888
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      comment-rate-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8888:8888"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gateway_db
      CUSTOMER_SERVICE_URL: http://customer-service:8888
      PRODUCT_SERVICE_URL: http://product-service:8888
      BOOK_SERVICE_URL: http://book-service:8888
      CART_SERVICE_URL: http://cart-service:8888
      STAFF_SERVICE_URL: http://staff-service:8888
      MANAGER_SERVICE_URL: http://manager-service:8888
      CATALOG_SERVICE_URL: http://catalog-service:8888
      ORDER_SERVICE_URL: http://order-service:8888
      SHIP_SERVICE_URL: http://ship-service:8888
      PAY_SERVICE_URL: http://pay-service:8888
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8888
      RECOMMENDER_SERVICE_URL: http://recommender-ai-service:8888
    depends_on:
      postgres:
        condition: service_healthy
      customer-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      staff-service:
        condition: service_started
      manager-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
      ship-service:
        condition: service_started
      pay-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      recommender-ai-service:
        condition: service_started

  # ─────────────────────────────────────────────
  # Init service – runs migrations & seeding once
  # ─────────────────────────────────────────────
  init-data:
    build:
      context: .
      dockerfile: docker/init/Dockerfile
    restart: "no"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - default

volumes:
  postgres_data:
    driver: local
